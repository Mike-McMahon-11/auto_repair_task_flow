<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><title>WreckFlow — Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root{ --bg:#0a0f1c; --brand:#111827; --surface:#0f172a; --elev:#0b1220; --line:#1f2937; --text:#e5e7eb; --muted:#a3b2c6; --accent2:#2563eb }
body{margin:0; color:var(--text); background:linear-gradient(135deg,#0a0f1c,#0b1220 32%,#0a1020); font:14px/1.45 system-ui,Segoe UI,Roboto,Helvetica,Arial}
.card{max-width:520px; margin:30px auto; padding:16px; border:1px solid var(--line); border-radius:16px; background:#0b1220cc}
.input{width:100%; padding:12px; border-radius:12px; border:1px solid var(--line); background:var(--surface); color:var(--text)}
.btn{background:#2563eb; color:#fff; border:1px solid #2563eb; padding:10px 14px; border-radius:12px; font-weight:700}
:root[data-theme="light"] body{background:linear-gradient(135deg,#f8fafc,#eef2ff 32%,#ffffff); color:#0b1324}
:root[data-theme="light"] .card{background:#fff; border:1px solid #94a3b8; box-shadow:0 10px 28px rgba(15,23,42,.08)}
:root[data-theme="light"] .input{background:#fff; color:#0b1324; border:1px solid #94a3b8}

.site-footer{
    text-align:center;
    margin:30px 0 20px;
    font-size:13px;
    color:var(--muted);
}

.site-footer a{
    color:var(--muted);
    text-decoration:none;
    margin:0 8px;
}

.site-footer a:hover{
    text-decoration:underline;
}

</style></head>
<body>
<div class="card">
  <h2 style="margin:0 0 10px">Reset Password</h2>
  <p style="color:var(--muted)">Enter your email. If it matches an account, you’ll receive a reset link.</p>
  <form method="post" action="{{ url_for('reset_password') }}">
    <input class="input" type="email" name="email" placeholder="you@example.com" required />
    <div style="margin-top:10px; display:flex; justify-content:flex-end"><button class="btn" type="submit">Send reset link</button></div>
  </form>
</div>
<script>(function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme', t); })();</script>

  <footer class="site-footer">
      <a href="{{ url_for('privacy') }}">Privacy Policy</a>
  </footer>

</body></html>
